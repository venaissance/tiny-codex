name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      # semantic-release does everything:
      # 1. Analyze commits → determine version bump
      # 2. Update package.json + CHANGELOG.md
      # 3. Build DMG (via @semantic-release/exec prepareCmd)
      # 4. Create GitHub Release + upload DMG (via @semantic-release/github)
      # 5. Commit version bump + push tag
      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
