name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Tests
      - run: pnpm test

      # Semantic Release — analyzes commits, bumps version, creates tag + GitHub Release
      - name: Semantic Release
        id: semantic
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build DMG only if a new version was released
      - name: Build DMG
        if: steps.semantic.outcome == 'success'
        run: pnpm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload DMG to the GitHub Release created by semantic-release
      - name: Upload DMG
        if: steps.semantic.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.semantic.outputs.new_release_version }}
          files: release/*.dmg
